  <rect x="20" y="72" width="860" height="100" rx="10" fill="url(#inputGrad)" opacity="0.18" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="36" y="92" font-size="11" font-weight="700" fill="#93c5fd" letter-spacing="2">INPUT LAYER</text>

  <!-- Gmail node -->
