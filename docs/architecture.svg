  <text x="36" y="693" font-size="10" fill="#475569">Flow:  Gmail / Manual Input  →  Inbox/  →  inbox_watcher  →  Needs_Action/  →  Gold Agent  →  MCP Layer  →  HITL Gate  →  Done/  →  CEO Briefing  →  Briefings/</text>
