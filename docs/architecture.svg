  <line x1="350" y1="125" x2="388" y2="125" stroke="#60a5fa" stroke-width="1.5"/>
  <line x1="530" y1="125" x2="568" y2="125" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>

